<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MONITORAGGIO INCENDI ITALIA - SISTEMA BLINDATO</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        html, body { height: 100%; margin: 0; font-family: 'Segoe UI', sans-serif; background: #1a1a1a; overflow: hidden; }
        header { height: 60px; background: #1a1a1a; color: white; display: flex; align-items: center; padding: 0 20px; justify-content: space-between; border-bottom: 1px solid #333; z-index: 1001; position: relative; }
        #map { height: calc(100vh - 60px); width: 100%; background: #000; cursor: crosshair; }
        .stats { font-weight: bold; line-height: 1.2; }
        .area-info { font-size: 0.75em; color: #ffa500; display: block; }
        .legend { background: rgba(255,255,255,0.95); padding: 10px; border-radius: 8px; font-size: 11px; color: #333; box-shadow: 0 0 15px rgba(0,0,0,0.4); }
        .legend i { width: 12px; height: 12px; display: inline-block; margin-right: 5px; border-radius: 2px; vertical-align: middle; }
        .fire-marker { width: 30px !important; height: 30px !important; display: flex; align-items: center; justify-content: center; }
        @keyframes pulse { 0% { transform: scale(0.8); opacity: 0.8; } 50% { transform: scale(1.4); opacity: 0.1; } 100% { transform: scale(0.8); opacity: 0.8; } }
        .pulse { width: 30px; height: 30px; border-radius: 50%; position: absolute; animation: pulse 1.8s infinite; pointer-events: none; }
        .btn-news, .btn-refresh, .btn-report { border: none; padding: 8px 12px; border-radius: 4px; cursor: pointer; font-weight: bold; color: white; transition: 0.3s; }
        .btn-news { background: #3498db; } .btn-refresh { background: #2ecc71; } .btn-report { background: #e67e22; }
        .btn-news:hover, .btn-refresh:hover, .btn-report:hover { opacity: 0.8; }
        #report-panel, #auth-panel { position: fixed; top: 70px; left: 20px; background: #2c3e50; color: white; padding: 15px; border-radius: 8px; z-index: 2000; display: none; width: 280px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        input, select { width: 100%; margin-bottom: 10px; padding: 8px; box-sizing: border-box; border-radius: 4px; border: none; }
    </style>
</head>
<body>

<header>
    <div class="stats">
        🇮🇹 MONITORAGGIO ITALIA: <span id="count">...</span>
        <span class="area-info" id="area">Blacklist Industriale & Vulcani: ATTIVA</span>
    </div>
    <div style="display:flex; gap:10px;">
        <button class="btn-report" onclick="checkAccessForReport()">SEGNALA</button>
        <button class="btn-news" onclick="window.open('https://www.vigilfuoco.it/media/notizie/dal-territorio', '_blank')">NEWS VVF</button>
        <button class="btn-refresh" onclick="loadFires()"><i class="fas fa-sync"></i> REFRESH</button>
        <div id="login-zone">
            <button onclick="toggleAuth()" style="background:#e74c3c; color:white; border:none; padding:8px 12px; border-radius:4px; cursor:pointer;">ACCEDI</button>
        </div>
    </div>
</header>

<div id="auth-panel">
    <h3>ACCESSO</h3>
    <input type="email" id="auth-email" placeholder="Email">
    <input type="password" placeholder="Password">
    <button onclick="handleAuth()" style="width:100%; background:#e74c3c; color:white; padding:10px; border:none; border-radius:4px;">ENTRA</button>
</div>

<div id="report-panel">
    <h3>NUOVA SEGNALAZIONE</h3>
    <input type="text" id="rep-coords" placeholder="Lat, Lon" readonly>
    <select id="rep-type">
        <option value="Boschivo">Boschivo</option>
        <option value="Sterpaglie">Sterpaglie</option>
    </select>
    <input type="file" accept="image/*">
    <button onclick="submitManualReport()" style="width:100%; background:#2ecc71; color:white; padding:10px; border:none; border-radius:4px;">INVIA</button>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    const map = L.map('map', { center: [42.0, 12.5], zoom: 6 });
    const sat = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}').addTo(map);
    const topo = L.tileLayer('https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png');
    
    L.control.layers({ "🛰️ Satellite": sat, "⛰️ Topo": topo }, null, {collapsed: false}).addTo(map);
    const firesLayer = L.layerGroup().addTo(map);
    const circleLayer = L.layerGroup().addTo(map);

    // --- BLACKLIST INTEGRALE (Vulcani e Raffinerie) ---
    const blacklist = [
        [37.75, 14.99], [38.79, 15.21], // Etna e Stromboli
        [37.13, 15.21], [37.15, 14.23], // Priolo e Gela
        [40.48, 17.22], [40.63, 14.92], // Taranto e Salerno
        [44.91, 8.89], [42.09, 11.82],  // Sannazzaro e Civitavecchia
        [45.45, 12.23], [43.60, 13.36], // Marghera e Ancona
        [44.43, 8.75], [43.58, 10.34],  // Genova e Livorno
        [39.11, 9.04], [40.62, 18.00],  // Sarroch e Brindisi
        [45.14, 9.94], [45.41, 9.11],   // Cremona e Milano Sud
        [42.56, 12.67], [45.78, 8.68],  // Terni e Vergiate
        [37.21, 15.17], [37.43, 15.03], [41.69, 13.14], [39.07, 9.01],
        [39.21, 8.40], [40.55, 9.67], [43.36, 12.54], [43.85, 12.78],
        [44.67, 10.85], [45.45, 10.45], [45.52, 9.79], [45.48, 9.03], [45.63, 9.60]
    ];

    function isWithinItaly(lat, lon) {
        // Confini nazionali e Pelagie
        if (lat > 35.4 && lat < 36.0 && lon > 12.3 && lon < 12.9) return true; // Lampedusa
        if (lat < 36.6 || lat > 47.1 || lon < 6.5 || lon > 18.6) return false;
        if (lat > 41.3 && lat < 43.1 && lon > 8.4 && lon < 9.6) return false; // Corsica
        
        // CONTROLLO BLACKLIST (Raggio 0.04°)
        return !blacklist.some(s => Math.abs(s[0] - lat) < 0.04 && Math.abs(s[1] - lon) < 0.04);
    }

    async function loadFires() {
        try {
            const response = await fetch("https://corsproxy.io/?" + encodeURIComponent("https://firms.modaps.eosdis.nasa.gov/api/area/csv/6c7f29542d837e182b0bf7292cb52b99/VIIRS_SNPP_NRT/world/1"));
            const text = await response.text();
            const rows = text.split('\n').slice(1);
            firesLayer.clearLayers();
            circleLayer.clearLayers();
            let count = 0;

            rows.forEach(row => {
                const d = row.split(',');
                if (d.length < 3) return;
                const lat = parseFloat(d[0]), lon = parseFloat(d[1]);
                if (isWithinItaly(lat, lon)) {
                    count++;
                    const temp = (parseFloat(d[2]) - 273.15).toFixed(1);
                    const color = temp > 67 ? "#e74c3c" : (temp > 52 ? "#e67e22" : "#f1c40f");
                    
                    // Marker Pulsante
                    L.marker([lat, lon], {
                        icon: L.divIcon({ className: 'fire-marker', html: `<div class="pulse" style="border:1px solid ${color}"></div><i class="fas fa-fire" style="color:${color}"></i>` })
                    }).addTo(firesLayer).bindPopup(`Temp: ${temp}°C`);

                    // CERCHIO FISSO ROSSO (Area ~14 ha)
                    L.circle([lat, lon], {
                        radius: 375, color: "#e74c3c", weight: 2, opacity: 0.8, fillOpacity: 0.1, interactive: false
                    }).addTo(circleLayer);
                }
            });
            document.getElementById('count').innerText = count;
            document.getElementById('area').innerText = `Sup. Stimata: ${(count * 14.06).toFixed(2)} ha`;
        } catch (e) { console.error(e); }
    }

    // Auth e Segnalazioni
    let user = null;
    function toggleAuth() { document.getElementById('auth-panel').style.display = 'block'; }
    function handleAuth() {
        user = document.getElementById('auth-email').value;
        if(user) {
            document.getElementById('login-zone').innerHTML = `<b>ID: ${user.split('@')[0].toUpperCase()}</b>`;
            document.getElementById('auth-panel').style.display = 'none';
        }
    }
    function checkAccessForReport() {
        if(!user) { alert("Accedi!"); toggleAuth(); }
        else { document.getElementById('report-panel').style.display = 'block'; }
    }
    map.on('click', (e) => {
        if(document.getElementById('report-panel').style.display === 'block')
            document.getElementById('rep-coords').value = e.latlng.lat.toFixed(4) + ", " + e.latlng.lng.toFixed(4);
    });
    function submitManualReport() {
        const coords = document.getElementById('rep-coords').value.split(',').map(Number);
        L.marker(coords, { icon: L.divIcon({ className: 'fire-marker', html: `<div class="pulse" style="border:2px solid #9b59b6"></div><i class="fas fa-user-shield" style="color:#9b59b6"></i>` })}).addTo(map);
        document.getElementById('report-panel').style.display = 'none';
    }

    const legend = L.control({position: 'bottomright'});
    legend.onAdd = function() {
        const div = L.DomUtil.create('div', 'legend');
        div.innerHTML = `<b>LEGENDA</b><br><i style="background:#e74c3c"></i> Critico<br><i style="background:#e67e22"></i> Elevato<br><i style="background:#f1c40f"></i> Moderato<br><hr><i style="border:1px solid #e74c3c; border-radius:50%; width:10px; height:10px; display:inline-block"></i> Area Stimata<br><i style="background:#9b59b6"></i> Segnalazione`;
        return div;
    };
    legend.addTo(map);

    loadFires();
</script>
</body>
</html>
