<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitoraggio Incendi Italia - Operativo</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { margin: 0; font-family: 'Segoe UI', sans-serif; }
        #map { height: calc(100vh - 60px); width: 100%; cursor: crosshair; }
        header {
            height: 60px; background: #2c3e50; color: white;
            display: flex; align-items: center; padding: 0 20px; justify-content: space-between;
        }
        .login-box input { padding: 6px; border-radius: 4px; border: none; margin-right: 5px; }
        .login-box button { padding: 6px 15px; cursor: pointer; background: #e74c3c; color: white; border: none; border-radius: 4px; font-weight: bold; }
        #admin-panel { height: 40px; background: #ecf0f1; display: flex; align-items: center; padding: 0 20px; gap: 15px; border-bottom: 2px solid #bdc3c7; }
        .hidden { display: none; }
        .info.legend { padding: 10px; background: rgba(255,255,255,0.9); line-height: 18px; border-radius: 5px; box-shadow: 0 0 15px rgba(0,0,0,0.2); }
        .info.legend i { width: 16px; height: 16px; float: left; margin-right: 8px; opacity: 0.8; }
        .btn-delete { background: #e74c3c; color: white; border: none; padding: 8px; border-radius: 4px; cursor: pointer; margin-top: 10px; width: 100%; font-weight: bold; }
        .btn-manual { background: #3498db; color: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .status-tag { padding: 5px 10px; border-radius: 4px; font-weight: bold; font-size: 12px; }
        .status-staff { background: #2ecc71; color: white; }
        .status-volontario { background: #3498db; color: white; }
    </style>
</head>
<body>

<header>
    <div>🔥 MONITORAGGIO: <span id="fire-count" style="color:#ffdd59; font-weight:bold;">...</span></div>
    <div id="login-section" class="login-box">
        <input type="password" id="operator-code" placeholder="Codice Accesso">
        <button onclick="checkAuth()">ENTRA</button>
    </div>
    <div id="user-logged" class="hidden">
        <span id="role-label" class="status-tag"></span>
    </div>
</header>

<div id="admin-panel" class="hidden">
    <button onclick="location.reload()" style="font-size:12px;">Aggiorna Dati</button>
    <div id="staff-only-actions" class="hidden">
        <button onclick="resetRimossi()" style="font-size:12px; background:#bdc3c7;">Ripristina Segnalazioni (Staff Only)</button>
    </div>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    const map = L.map('map').setView([42.0, 12.5], 6);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    let userRole = null;
    let puntiRimossi = JSON.parse(localStorage.getItem('puntiRimossi')) || [];
    let segnalazioniManuali = JSON.parse(localStorage.getItem('segnalazioniManuali')) || [];
    let markersLayer = L.layerGroup().addTo(map);
    let manualLayer = L.layerGroup().addTo(map);

    function checkAuth() {
        const code = document.getElementById('operator-code').value;
        const roleLabel = document.getElementById('role-label');
        
        if (code === "GABRIELE_STAFF") {
            userRole = 'staff';
            roleLabel.innerText = "⭐ STAFF";
            roleLabel.className = "status-tag status-staff";
            document.getElementById('staff-only-actions').classList.remove('hidden');
        } else if (code === "VOLONTARIO2024") {
            userRole = 'volontario';
            roleLabel.innerText = "👥 VOLONTARIO";
            roleLabel.className = "status-tag status-volontario";
        } else {
            alert("Codice Errato.");
            return;
        }
        document.getElementById('login-section').classList.add('hidden');
        document.getElementById('user-logged').classList.remove('hidden');
        document.getElementById('admin-panel').classList.remove('hidden');
        loadNasaData();
        renderManuali();
    }

    // --- FUNZIONE PER CLICCARE SULLA MAPPA ---
    map.on('click', function(e) {
        if (!userRole) return; // Solo chi è loggato può segnalare

        const lat = e.latlng.lat.toFixed(4);
        const lon = e.latlng.lng.toFixed(4);

        const popupClick = L.popup()
            .setLatLng(e.latlng)
            .setContent(`
                <div style="text-align:center;">
                    <b>Segnala Incendio qui?</b><br>
                    Lat: ${lat}<br>Lon: ${lon}<br><br>
                    <button class="btn-manual" onclick="aggiungiSegnalazione(${lat}, ${lon})">INVIA SEGNALAZIONE</button>
                </div>
            `)
            .openOn(map);
    });

    function aggiungiSegnalazione(lat, lon) {
        const nuova = { lat, lon, id: `man_${Date.now()}`, data: new Date().toLocaleTimeString() };
        segnalazioniManuali.push(nuova);
        localStorage.setItem('segnalazioniManuali', JSON.stringify(segnalazioniManuali));
        map.closePopup();
        renderManuali();
    }

    function renderManuali() {
        manualLayer.clearLayers();
        segnalazioniManuali.forEach(s => {
            const iconaManuale = L.divIcon({
                html: `<i class="fas fa-bullseye" style="color: #9b59b6; font-size: 24px; text-shadow: 0 0 3px white;"></i>`,
                className: 'custom-manual-icon', iconSize: [25, 25], iconAnchor: [12, 12]
            });

            let content = `<b>📍 SEGNALAZIONE MANUALE</b><br>Ore: ${s.data}`;
            if (userRole === 'staff') {
                content += `<br><button class="btn-delete" onclick="eliminaManuale('${s.id}')">Rimuovi Segnalazione</button>`;
            }

            L.marker([s.lat, s.lon], {icon: iconaManuale}).addTo(manualLayer).bindPopup(content);
        });
    }

    function eliminaManuale(id) {
        segnalazioniManuali = segnalazioniManuali.filter(s => s.id !== id);
        localStorage.setItem('segnalazioniManuali', JSON.stringify(segnalazioniManuali));
        renderManuali();
    }

    // --- LOGICA NASA (Invariata per i filtri) ---
    function getColor(temp) { return temp > 325 ? '#d73027' : temp > 315 ? '#f46d43' : temp > 305 ? '#fdae61' : '#fee08b'; }

    async function loadNasaData() {
        const NASA_KEY = "6c7f29542d837e182b0bf7292cb52b99";
        const url = `https://corsproxy.io/?https://firms.modaps.eosdis.nasa.gov/api/area/csv/${NASA_KEY}/VIIRS_SNPP_NRT/6,35,19,48/1`;
        try {
            const res = await fetch(url);
            const csv = await res.text();
            const lines = csv.split('\n').filter(l => l.trim().length > 0).slice(1);
            markersLayer.clearLayers();
            let count = 0;
            lines.forEach(line => {
                const c = line.split(',');
                if(c.length > 2) {
                    const lat = parseFloat(c[0]), lon = parseFloat(c[1]), bright = parseFloat(c[2]);
                    const idPunto = `${lat}_${lon}`;
                    let isItaly = false;
                    if (lat >= 44.8 && lat <= 47.1 && lon >= 6.6 && lon <= 13.5) isItaly = true;
                    else if (lat >= 44.0 && lat < 44.8 && lon >= 6.6 && lon <= 13.8) isItaly = true;
                    else if (lat >= 39.5 && lat < 44.0 && lon >= 7.2 && lon <= 15.5) {
                        isItaly = true;
                        if (lon < 9.6 && lat > 41.3 && lat < 43.1) isItaly = false;
                    }
                    else if (lat >= 36.5 && lat < 39.5 && lon >= 12.0 && lon <= 18.8) isItaly = true;
                    else if (lat >= 38.8 && lat <= 41.3 && lon >= 8.0 && lon <= 10.0) isItaly = true;

                    if (isItaly && !puntiRimossi.includes(idPunto)) {
                        count++;
                        const col = getColor(bright);
                        const fireIcon = L.divIcon({
                            html: `<i class="fas fa-fire" style="color: ${col}; font-size: 22px; text-shadow: 0 0 3px black;"></i>`,
                            className: 'custom-fire-icon', iconSize: [20, 20], iconAnchor: [10, 10]
                        });
                        let popupContent = `<b>🔥 Segnalazione Satellite</b><br>Intensità: ${bright}K`;
                        if (userRole === 'staff') {
                            popupContent += `<br><button class="btn-delete" onclick="rimuoviPunto('${idPunto}')">Elimina (Staff)</button>`;
                        }
                        L.marker([lat, lon], {icon: fireIcon}).addTo(markersLayer).bindPopup(popupContent);
                        L.circle([lat, lon], { color: col, fillColor: col, fillOpacity: 0.2, radius: 1500 }).addTo(markersLayer);
                    }
                }
            });
            document.getElementById('fire-count').innerText = count + " satellitari + " + segnalazioniManuali.length + " manuali";
        } catch(e) { console.error(e); }
    }

    function rimuoviPunto(id) {
        if (userRole !== 'staff') return;
        puntiRimossi.push(id);
        localStorage.setItem('puntiRimossi', JSON.stringify(puntiRimossi));
        loadNasaData();
    }

    function resetRimossi() {
        if (userRole !== 'staff') return;
        puntiRimossi = []; segnalazioniManuali = [];
        localStorage.removeItem('puntiRimossi'); localStorage.removeItem('segnalazioniManuali');
        loadNasaData(); renderManuali();
        alert("Mappa resettata completamente dallo Staff.");
    }

    loadNasaData();
</script>
</body>
</html>
