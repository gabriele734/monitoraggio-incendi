<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Centrale Operativa Incendi - Italia</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { margin: 0; font-family: 'Segoe UI', sans-serif; }
        #map { height: calc(100vh - 60px); width: 100%; cursor: crosshair; }
        header {
            height: 60px; background: #2c3e50; color: white;
            display: flex; align-items: center; padding: 0 20px; justify-content: space-between;
        }
        .login-box input { padding: 6px; border-radius: 4px; border: none; margin-right: 5px; }
        .login-box button { padding: 6px 15px; cursor: pointer; background: #e74c3c; color: white; border: none; border-radius: 4px; font-weight: bold; }
        #admin-panel { height: 40px; background: #ecf0f1; display: flex; align-items: center; padding: 0 20px; gap: 15px; border-bottom: 2px solid #bdc3c7; }
        .hidden { display: none; }
        .btn-delete { background: #e74c3c; color: white; border: none; padding: 8px; border-radius: 4px; cursor: pointer; margin-top: 10px; width: 100%; font-weight: bold; }
        .btn-send { background: #3498db; color: white; border: none; padding: 8px; border-radius: 4px; cursor: pointer; width: 100%; font-weight: bold; margin-top: 5px; }
        .status-tag { padding: 5px 10px; border-radius: 4px; font-weight: bold; font-size: 12px; }
        .status-staff { background: #2ecc71; color: white; }
        .status-volontario { background: #3498db; color: white; }
        .preview-img { width: 100%; max-height: 150px; object-fit: cover; border-radius: 4px; margin-top: 8px; border: 1px solid #ddd; }
        textarea { width: 100%; border: 1px solid #ccc; border-radius: 4px; margin-top: 5px; font-family: inherit; box-sizing: border-box; }
    </style>
</head>
<body>

<header>
    <div>🔥 CENTRALE INCENDI: <span id="fire-count" style="color:#ffdd59; font-weight:bold;">Caricamento...</span></div>
    <div id="login-section" class="login-box">
        <input type="password" id="operator-code" placeholder="Codice Operatore">
        <button onclick="checkAuth()">ENTRA</button>
    </div>
    <div id="user-logged" class="hidden">
        <span id="role-label" class="status-tag"></span>
    </div>
</header>

<div id="admin-panel" class="hidden">
    <button onclick="location.reload()" style="font-size:12px;">Aggiorna Mappa</button>
    <div id="staff-only-actions" class="hidden">
        <button onclick="resetTutto()" style="font-size:12px; background:#bdc3c7;">Resetta Memoria (Staff)</button>
    </div>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
