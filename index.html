<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SISTEMA MONITORAGGIO INCENDI ITALIA - WGS 84 DMS</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        /* UI ORIGINALE MANTENUTA */
        html, body { height: 100%; margin: 0; font-family: 'Segoe UI', sans-serif; background: #0b0e11; overflow: hidden; }
        header { height: 60px; background: #1a1d21; color: white; display: flex; align-items: center; padding: 0 20px; justify-content: space-between; border-bottom: 2px solid #e74c3c; z-index: 1001; position: relative; }
        #map { height: calc(100vh - 60px); width: 100%; background: #000; }
        .stats { font-weight: bold; text-shadow: 1px 1px 2px rgba(0,0,0,0.8); }
        .area-info { font-size: 0.75em; color: #ffa500; display: block; }
        
        /* BOTTONI CON HOVER (Punto 29) */
        .btn { border: none; padding: 8px 12px; border-radius: 4px; cursor: pointer; font-weight: bold; color: white; transition: 0.3s; margin-left: 5px; }
        .btn:hover { opacity: 0.8; transform: translateY(-1px); }
        .btn-news { background: #3498db; } .btn-report { background: #e67e22; } .btn-refresh { background: #2ecc71; } .btn-login { background: #e74c3c; }

        /* PANNELLI E ACCOUNT (Punti 4, 17, 18, 21) */
        .panel { position: fixed; top: 75px; left: 20px; background: #1a1d21; border: 1px solid #444; padding: 15px; border-radius: 8px; z-index: 2000; display: none; width: 310px; color: white; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        input, select { width: 100%; margin-bottom: 10px; padding: 8px; border-radius: 4px; border: none; background: #2c3e50; color: white; box-sizing: border-box; }
        
        /* DISPLAY COORDINATE WGS84 */
        .wgs-box { background: #000; border: 1px solid #e74c3c; padding: 10px; border-radius: 4px; margin-bottom: 10px; font-family: monospace; color: #2ecc71; font-size: 0.9em; }

        /* MARKER E ANIMAZIONI (Punti 7, 31, 33) */
        @keyframes pulse { 0% { transform: scale(0.8); opacity: 0.8; } 50% { transform: scale(1.4); opacity: 0.1; } 100% { transform: scale(0.8); opacity: 0.8; } }
        .pulse { width: 30px; height: 30px; border-radius: 50%; position: absolute; animation: pulse 1.8s infinite; pointer-events: none; }
        .fire-marker { display: flex; align-items: center; justify-content: center; }
        
        /* POPUP MODERNI (Punto 28) */
        .leaflet-popup-content-wrapper { background: #1a1d21; color: white; border: 1px solid #444; }
    </style>
</head>
<body>

<header>
    <div class="stats">
        🇮🇹 ALERT NASA: <span id="count">0</span>
        <span class="area-info" id="area">Sup. Stimata: 0,00 ha</span>
    </div>
    <div style="display:flex; align-items:center;">
        <button class="btn btn-report" onclick="checkAccessForReport()">SEGNALA</button>
        <button class="btn btn-news" onclick="window.open('https://www.vigilfuoco.it/media/notizie/dal-territorio')">NEWS VVF</button>
        <button class="btn btn-refresh" onclick="loadData()"><i class="fas fa-sync"></i></button>
        <div id="login-zone"><button class="btn btn-login" onclick="toggleAuth()">ACCEDI</button></div>
    </div>
</header>

<div id="auth-panel" class="panel">
    <h3 id="auth-title">ACCESSO</h3>
    <input type="email" id="auth-email" placeholder="Email">
    <input type="password" placeholder="Password">
    <button class="btn btn-login" style="width:100%" onclick="handleAuth()">ENTRA</button>
    <p style="font-size:0.8em; cursor:pointer; color:#3498db" onclick="switchAuth()" id="auth-sw">Non hai un account? Registrati</p>
</div>

<div id="report-panel" class="panel">
    <span style="float:right; cursor:pointer" onclick="closeReport()">✖</span>
    <h3>NUOVA SEGNALAZIONE</h3>
    <div class="wgs-box">
        <strong>SISTEMA WGS 84:</strong><br>
        <span id="wgs-lat">N: ---</span><br>
        <span id="wgs-lon">E: ---</span>
    </div>
    <input type="hidden" id="raw-coords">
    <select id="rep-type"><option value="">Tipo...</option><option>Boschivo</option><option>Sterpaglie</option></select>
    <input type="file" id="rep-file" accept="image/*">
    <button class="btn btn-refresh" style="width:100%" onclick="submitManual()">INVIA</button>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    const map = L.map('map', { center: [42.0, 12.5], zoom: 6, minZoom: 5, maxZoom: 18 });
    const sat = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}').addTo(map);
    const topo = L.tileLayer('https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png');
    L.control.layers({"🛰️ Satellite": sat, "⛰️ Topo": topo}).addTo(map);

    const firesLayer = L.layerGroup().addTo(map);
    const circleLayer = L.layerGroup().addTo(map);
    const userLayer = L.layerGroup().addTo(map);

    // BLACKLIST 0.04 (Punto 19)
    const blacklist = [[45.45, 12.23], [40.48, 17.22], [37.15, 14.23], [37.13, 15.21], [37.75, 14.99], [38.79, 15.21], [44.43, 8.75], [43.58, 10.34], [42.09, 11.82], [43.60, 13.36], [39.11, 9.04]];

    // CONVERSIONE WGS 84 GRADI PRIMI SECONDI
    function decimalToDMS(deg, pos, neg) {
        const d = Math.floor(Math.abs(deg));
        const m = Math.floor((Math.abs(deg) - d) * 60);
        const s = ((Math.abs(deg) - d - m/60) * 3600).toFixed(2);
        return `${d}° ${m}' ${s}" ${deg >= 0 ? pos : neg}`;
    }

    // FILTRO MURA (Punto 1, 16)
    function isItaly(lat, lon) {
        if (lat > 35.4 && lat < 36.0 && lon > 12.3 && lon < 12.9) return true; // Lampedusa
        if (lat < 36.6 || lat > 47.1 || lon < 6.5 || lon > 18.6) return false;
        if (lat > 41.3 && lat < 43.1 && lon > 8.4 && lon < 9.6) return false; // Corsica
        if (lat > 45.4 && lon > 13.6) return false; // Slovenia
        return !blacklist.some(b => Math.abs(b[0] - lat) < 0.04 && Math.abs(b[1] - lon) < 0.04);
    }

    async function loadData() {
        try {
            const r = await fetch("https://corsproxy.io/?" + encodeURIComponent("https://firms.modaps.eosdis.nasa.gov/api/area/csv/6c7f29542d837e182b0bf7292cb52b99/VIIRS_SNPP_NRT/world/1"));
            const text = await r.text();
            const rows = text.split('\n').slice(1);
            firesLayer.clearLayers(); circleLayer.clearLayers();
            let count = 0;

            rows.forEach(row => {
                const c = row.split(',');
                if (c.length < 10) return;
                const lat = parseFloat(c[0]), lon = parseFloat(c[1]), temp = Math.round(parseFloat(c[2])-273.15), conf = c[10];
                if (isItaly(lat, lon) && conf !== 'l') {
                    count++;
                    const color = temp > 67 ? "#e74c3c" : (temp > 52 ? "#e67e22" : "#f1c40f");
                    L.marker([lat, lon], {
                        icon: L.divIcon({ className: 'fire-marker', html: `<div class="pulse" style="background:${color}"></div><i class="fas fa-fire" style="color:${color}"></i>` })
                    }).addTo(firesLayer).bindPopup(`<b>NASA ALERT</b><br>T: ${temp}°C<br>N: ${decimalToDMS(lat, 'N', 'S')}<br>E: ${decimalToDMS(lon, 'E', 'W')}`);
                    L.circle([lat, lon], { radius: 375, color: '#e74c3c', weight: 1, fillOpacity: 0.1, interactive: false }).addTo(circleLayer);
                }
            });
            document.getElementById('count').innerText = count;
            document.getElementById('area').innerText = `Sup. Stimata: ${(count * 14.06).toLocaleString('it-IT')} ha`;
        } catch (e) { console.log("Errore API"); }
    }

    // GESTIONE ACCOUNT (Punto 4, 17, 20)
    let loggedUser = localStorage.getItem('user');
    let mode = 'login';
    if(loggedUser) loginUI(loggedUser);

    function toggleAuth() { document.getElementById('auth-panel').style.display = 'block'; }
    function switchAuth() { 
        mode = mode === 'login' ? 'reg' : 'login';
        document.getElementById('auth-title').innerText = mode === 'login' ? 'ACCESSO' : 'REGISTRAZIONE';
    }
    function handleAuth() {
        const mail = document.getElementById('auth-email').value;
        if(mail.includes('@')) { localStorage.setItem('user', mail); location.reload(); }
    }
    function loginUI(m) {
        document.getElementById('login-zone').innerHTML = `<b style="color:#2ecc71; margin-right:10px">ID: ${m.split('@')[0].toUpperCase()}</b><button class="btn btn-login" onclick="localStorage.clear();location.reload()">LOGOUT</button>`;
    }

    // SEGNALAZIONE (Punto 5, 18, 21)
    function checkAccessForReport() {
        if(!localStorage.getItem('user')) { alert("Accedi!"); toggleAuth(); }
        else document.getElementById('report-panel').style.display = 'block';
    }
    map.on('click', (e) => {
        if(document.getElementById('report-panel').style.display === 'block') {
            document.getElementById('wgs-lat').innerText = "N: " + decimalToDMS(e.latlng.lat, 'N', 'S');
            document.getElementById('wgs-lon').innerText = "E: " + decimalToDMS(e.latlng.lng, 'E', 'W');
            document.getElementById('raw-coords').value = JSON.stringify(e.latlng);
        }
    });
    function closeReport() {
        document.getElementById('report-panel').style.display = 'none';
        document.getElementById('rep-type').value = ""; document.getElementById('rep-file').value = "";
    }
    function submitManual() {
        if(!document.getElementById('rep-type').value || !document.getElementById('rep-file').files[0]) return alert("Dati mancanti!");
        const coords = JSON.parse(document.getElementById('raw-coords').value);
        L.marker(coords, { icon: L.divIcon({ html: `<div class="pulse" style="background:#9b59b6"></div><i class="fas fa-user-shield" style="color:#9b59b6; font-size:20px"></i>` }) }).addTo(userLayer);
        closeReport();
    }

    loadData();
    setInterval(loadData, 600000);
</script>
</body>
</html>
