<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Centrale Incendi Pro</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        html, body { height: 100%; margin: 0; padding: 0; }
        #map { 
            height: calc(100vh - 60px); 
            width: 100%; 
            display: block; /* Forza la visualizzazione */
            background: #cbd2d8; 
        }
        header { 
            height: 60px; background: #2c3e50; color: white; 
            display: flex; align-items: center; padding: 0 20px; justify-content: space-between;
        }
        .login-box input { padding: 8px; border-radius: 4px; border: none; margin-right: 5px; width: 140px; }
        .login-box button { padding: 8px 15px; cursor: pointer; background: #e74c3c; color: white; border: none; border-radius: 4px; font-weight: bold; }
        .hidden { display: none; }
        .legend { background: white; padding: 10px; border-radius: 5px; box-shadow: 0 0 10px rgba(0,0,0,0.2); }
    </style>
</head>
<body>

<header>
    <div id="fire-count">🔥 Centrale Operativa</div>
    <div id="login-section" class="login-box">
        <input type="password" id="operator-code" placeholder="Codice">
        <button onclick="checkAuth()">ENTRA</button>
    </div>
</header>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyClmNoNbNpxk5IjB9LsrQvWqPI1YodxY9E",
        authDomain: "monitoraggioincendi-41f5f.firebaseapp.com",
        projectId: "monitoraggioincendi-41f5f",
        storageBucket: "monitoraggioincendi-41f5f.firebasestorage.app",
        messagingSenderId: "63942195354",
        appId: "1:63942195354:web:cc5bb978858676c6748723"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // Inizializzazione mappa migliorata
    const map = L.map('map').setView([43.5, 12.0], 7);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    window.checkAuth = function() {
        const code = document.getElementById('operator-code').value;
        if (code === "GABRIELE_STAFF") {
            document.getElementById('login-section').innerHTML = "<b style='color:#2ecc71'>⭐ STAFF GABRIELE</b>";
            loadNasaData();
            attivaCloud();
        } else { alert("Codice Errato"); }
    };

    function attivaCloud() {
        onSnapshot(collection(db, "segnalazioni"), (snapshot) => {
            snapshot.forEach((docSnap) => {
                const s = docSnap.data();
                L.marker([s.lat, s.lon]).addTo(map).bindPopup(s.desc);
            });
        });
    }

    async function loadNasaData() {
        const url = `https://corsproxy.io/?https://firms.modaps.eosdis.nasa.gov/api/area/csv/6c7f29542d837e182b0bf7292cb52b99/VIIRS_SNPP_NRT/6,35,19,48/1`;
        const res = await fetch(url);
        const csv = await res.text();
        csv.split('\n').slice(1).forEach(line => {
            const c = line.split(',');
            if (c.length < 3) return;
            const lat = parseFloat(c[0]), lon = parseFloat(c[1]), bright = parseFloat(c[2]);
            const celsius = (bright - 273.15).toFixed(1);
            L.marker([lat, lon], {icon: L.divIcon({html: '<i class="fas fa-fire" style="color:red"></i>'})})
            .addTo(map).bindPopup(`Temp: ${celsius}°C`);
        });
    }
</script>
</body>
</html>
